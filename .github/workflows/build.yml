# GitHub Actions — exam-to-html CI/CD
#
# 触发:
#   - push to main
#   - tag v* (e.g. v0.1.0)
#   - workflow_dispatch (手动)
#
# 矩阵: Windows + macOS 双向 build + smoke
#
# 兄弟仓处理:
#   - topic_garden_app: 必须 (pyproject topic-garden 依赖)
#   - PDF2PPT: 可选 (容错, clone 失败时 skip 真 PDF E2E)

name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # release job 需要

jobs:
  # ============================================================
  # Test — pytest smoke (mock + 真 PDF, 后者依赖 PDF2PPT)
  # ============================================================
  test:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Clone sibling repos
        shell: bash
        run: |
          set -e
          git clone "https://github.com/${{ github.repository_owner }}/topic_garden_app.git" ../topic_garden_app
          # PDF2PPT 可选 — 教师日常可能没 push 到 GH
          if git clone "https://github.com/${{ github.repository_owner }}/PDF2PPT.git" ../PDF2PPT 2>/dev/null; then
            echo "✅ PDF2PPT cloned, real-PDF E2E 可跑"
          else
            echo "::warning::PDF2PPT not on GH, real-PDF E2E will skip"
          fi

      - name: Install topic_garden + exam-to-html
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ../topic_garden_app

      # 注: PDF2PPT v2 parser 已 vendored 到本仓顶层 pdf2ppt/ (见 README §开发)。
      # 兄弟仓 PDF2PPT 不再 install (避免空仓 clone 触发找不到 requirements.txt)。
      # test_smoke 真 PDF E2E 用 pytest.importorskip 自动跳过缺 deps 部分。

      - name: Install exam-to-html
        shell: bash
        run: pip install -e .[dev]

      - name: Run smoke tests
        shell: bash
        run: pytest tests/ -v

  # ============================================================
  # Build — PyInstaller 出 .exe / .app
  # ============================================================
  build:
    name: Build artifact (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Clone sibling repos
        shell: bash
        run: |
          git clone "https://github.com/${{ github.repository_owner }}/topic_garden_app.git" ../topic_garden_app
          git clone "https://github.com/${{ github.repository_owner }}/PDF2PPT.git" ../PDF2PPT 2>/dev/null || true

      - name: Install
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ../topic_garden_app
          # PDF2PPT v2 parser 已 vendored 进本仓顶层 pdf2ppt/ (见 README §开发)。
          # 兄弟仓 PDF2PPT 不再 install (避免空仓 clone 触发找不到 requirements.txt)。
          pip install -e ".[dev]"
          # PyInstaller 需单独装 (不在 [dev] extras, 见 pyproject.toml)
          pip install pyinstaller>=6.0

      - name: PyInstaller
        shell: bash
        run: pyinstaller pyinstaller.spec --noconfirm

      # Windows: 上传 .exe + _internal/ 整个目录
      - name: Zip Windows bundle
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/exam-to-html -DestinationPath dist/exam-to-html-windows.zip

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: exam-to-html-windows
          path: dist/exam-to-html-windows.zip

      # macOS: 上传 .app bundle (压缩)
      - name: Zip macOS bundle
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Exam to HTML.app" "Exam to HTML.app.zip"

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: exam-to-html-macos
          path: dist/Exam to HTML.app.zip

  # ============================================================
  # Release — 仅 tag 触发, 挂 artifact 到 GitHub Release
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/exam-to-html-windows/exam-to-html-windows.zip
            artifacts/exam-to-html-macos/Exam to HTML.app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Deploy version.json → gh-pages (设计文档 §7.2)
  #   仅 tag 触发, 用最新 tag version 渲染 version.json 推到 gh-pages
  #   教师 app 启动时 GET https://Asteriya-PhD.github.io/exam-to-html/version.json
  # ============================================================
  deploy-version:
    name: Deploy version.json → gh-pages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # push to gh-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Render version.json
        run: |
          cat > version.json << EOF
          {
            "latest_version": "${{ steps.version.outputs.version }}",
            "current_version": "${{ steps.version.outputs.version }}",
            "download_url": "https://github.com/${{ github.repository_owner }}/exam-to-html/releases/download/${{ github.ref_name }}/exam-to-html-windows.zip",
            "mac_download_url": "https://github.com/${{ github.repository_owner }}/exam-to-html/releases/download/${{ github.ref_name }}/Exam to HTML.app.zip",
            "release_notes": "https://github.com/${{ github.repository_owner }}/exam-to-html/releases/tag/${{ github.ref_name }}",
            "released_at": "$(date -u +%Y-%m-%d)"
          }
          EOF
          echo "✅ version.json:"
          cat version.json

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          # 只推 version.json, 排除 .github / .venv / tests 等
          exclude_assets: |
            .github/**
            tests/**
            .venv/**
            *.yml
            *.md
            *.toml
            *.spec
            *.py
            .gitignore
            .pytest_cache/**
          # 默认 commit_message: "Deploy: version.json (v0.1.0)"
          keep_files: false  # gh-pages 首次部署后只保留 version.json
          force_orphan: true  # 清空 gh-pages 历史 (只保留 version.json)